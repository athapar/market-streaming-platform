[theme]
base               = "light"
primaryColor       = "#1E40AF"
backgroundColor    = "#FFFFFF"
secondaryBackgroundColor = "#F1F5F9"
textColor          = "#0F172A"
font               = "sans serif"

[server]
headless           = true
runOnSave          = true

[browser]
gatherUsageStats   = false

[client]
toolbarMode        = "minimal"
showErrorDetails   = false
