# Copy this file to ~/.dbt/profiles.yml (or set DBT_PROFILES_DIR), or merge
# its contents into your existing profiles.yml alongside other projects.
#
# The profile name `streaming_warehouse` is intentionally distinct from the
# companion batch repo's `warehouse` profile (which targets BigQuery). Keep
# both side-by-side in your local profiles.yml so each project resolves to
# the right warehouse.
#
# All secrets are read from environment variables — never hardcode credentials.
#
# Required env vars (key-pair auth — see README for service-user setup):
#   SNOWFLAKE_ACCOUNT             e.g. myorg-ab12345
#   SNOWFLAKE_USER                e.g. SVC_STREAMING
#   SNOWFLAKE_PRIVATE_KEY_PATH    path to the .p8 private key
#   SNOWFLAKE_PRIVATE_KEY_PASSPHRASE  (optional — only if the key is encrypted)
#   SNOWFLAKE_WAREHOUSE           e.g. COMPUTE_WH
#   SNOWFLAKE_ROLE               e.g. STREAMING_ROLE  (optional — defaults to user's default role)

streaming_warehouse:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      private_key_passphrase: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PASSPHRASE', '') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', '') }}"
      database: MARKET_STREAMING
      schema: DBT_DEV
      threads: 4
      client_session_keep_alive: false

    ci:
      type: snowflake
      account: "ci-placeholder"
      user: "ci"
      password: "ci"
      warehouse: "CI_WH"
      database: MARKET_STREAMING
      schema: CI
      threads: 1
