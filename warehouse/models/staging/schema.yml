version: 2

models:
  - name: stg_streaming__daily_rollup
    description: >
      Daily OHLCV from the streaming pipeline's Gold layer. One row per
      (composite_figi, price_date). VWAP and volume reflect only the bars
      captured during the streaming session — a partial session will show lower
      volume and a session-VWAP that differs from the full-day batch VWAP.
    columns:
      - name: composite_figi
        description: OpenFIGI composite identifier.
        tests:
          - not_null
      - name: price_date
        description: Trading date (ET).
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
      - name: close_price
        tests:
          - not_null
      - name: volume
        tests:
          - not_null

  - name: stg_batch__daily_prices
    description: >
      Daily OHLCV from the batch pipeline (BigQuery → Snowflake bridge). One row
      per (composite_figi, price_date). Covers the full trading session.
    columns:
      - name: composite_figi
        tests:
          - not_null
      - name: price_date
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
      - name: close_price
        tests:
          - not_null
