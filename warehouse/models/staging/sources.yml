version: 2

sources:
  - name: gold
    database: MARKET_STREAMING
    schema: GOLD
    description: >
      Streaming Gold layer — produced by the Databricks Gold ingest notebook.
      GOLD_MINUTE_BARS holds one row per (composite_figi, minute window).
      GOLD_DAILY_ROLLUP is a full-day OHLCV rollup recomputed from all Silver bars
      each run; it is the streaming counterpart of the batch daily price mart.
    tables:
      - name: GOLD_MINUTE_BARS
        description: Serving-ready OHLCV per (composite_figi, 1-minute window).
        columns:
          - name: COMPOSITE_FIGI
            description: OpenFIGI composite identifier — join key with security master.
          - name: SYMBOL
            description: Ticker symbol (e.g. AAPL).
          - name: WINDOW_START
            description: Inclusive start of the 1-minute bar (UTC, TIMESTAMP_NTZ).
          - name: WINDOW_END
            description: Exclusive end of the 1-minute bar (UTC, TIMESTAMP_NTZ).
          - name: EVENT_DATE
            description: Calendar date of the bar (ET trading date).
          - name: OPEN_PRICE
          - name: HIGH_PRICE
          - name: LOW_PRICE
          - name: CLOSE_PRICE
          - name: VOLUME
          - name: VWAP
          - name: TRADE_COUNT
          - name: SILVER_TIMESTAMP
            description: Timestamp the Silver row was written (pipeline lineage).

      - name: GOLD_TRADES
        description: >
          Tick-level trade data. One row per executed trade per (composite_figi, trade_id).
          Synced from Databricks Gold via Snowflake sync notebook.
        columns:
          - name: COMPOSITE_FIGI
          - name: SYMBOL
          - name: TRADE_ID
            description: Globally unique trade identifier from Polygon.
          - name: TRADE_PRICE
          - name: TRADE_SIZE
            description: Number of shares in this trade.
          - name: EXCHANGE_ID
          - name: TAPE
          - name: SIP_TIMESTAMP
            description: SIP-reported trade timestamp (nanosecond precision, stored as TIMESTAMP_NTZ).
          - name: TRADE_DATE
          - name: SILVER_TIMESTAMP

      - name: GOLD_QUOTE_STATS
        description: >
          Pre-aggregated NBBO quote statistics. One row per (composite_figi, minute).
          Aggregated from raw Silver quotes in the Gold layer to manage Snowflake volume.
          Covers ~20 high-liquidity symbols with quote subscriptions.
        columns:
          - name: COMPOSITE_FIGI
          - name: SYMBOL
          - name: WINDOW_START
            description: Start of the 1-minute aggregation window.
          - name: QUOTE_DATE
          - name: QUOTE_COUNT
            description: Number of NBBO updates in this minute.
          - name: AVG_SPREAD_BPS
            description: Average quoted spread in basis points.
          - name: MIN_SPREAD_BPS
          - name: MAX_SPREAD_BPS
          - name: AVG_MID_PRICE
          - name: ORDER_IMBALANCE
            description: (bid_size - ask_size) / (bid_size + ask_size). Positive = buy pressure.
          - name: UPDATED_AT

      - name: GOLD_DAILY_ROLLUP
        description: >
          Full-day OHLCV aggregated from all minute bars for a trading date.
          Updated on each Gold ingest run; stale until Gold runs after market close.
        columns:
          - name: COMPOSITE_FIGI
          - name: SYMBOL
          - name: EVENT_DATE
          - name: OPEN_PRICE
          - name: HIGH_PRICE
          - name: LOW_PRICE
          - name: CLOSE_PRICE
          - name: VOLUME
          - name: VWAP
          - name: TOTAL_TRADES
          - name: BAR_COUNT
          - name: FIRST_BAR_START
          - name: LAST_BAR_START
          - name: UPDATED_AT

  - name: ops
    database: MARKET_STREAMING
    schema: OPS
    description: >
      Pipeline operational metrics written by the Spark foreachBatch handlers.
      One row per (layer, batch_id) recording execution time, row counts, and status.
    tables:
      - name: PIPELINE_BATCH_METRICS
        description: >
          Per-batch execution metrics. Written by the BatchTracker context manager
          in each Spark streaming layer. Tracks rows_in, rows_out, duration_ms,
          and error status for observability.
        columns:
          - name: LAYER
            description: Pipeline layer (bronze, silver, gold).
          - name: BATCH_ID
          - name: ROWS_IN
          - name: ROWS_OUT
          - name: DURATION_MS
          - name: STARTED_AT
          - name: COMPLETED_AT
          - name: STATUS
          - name: ERROR_MESSAGE

  - name: recon
    database: MARKET_STREAMING
    schema: RECON
    description: >
      Reconciliation bridge — batch pipeline daily prices loaded from BigQuery
      via scripts/bq_to_snowflake_batch.py. Populated once per trading day
      after the batch pipeline completes (~7–8 PM ET).
    tables:
      - name: BATCH_DAILY_PRICES
        description: >
          Daily OHLCV sourced from the batch pipeline's BigQuery mart
          (fct_daily_ohlcv). One row per (composite_figi, price_date).
          Covers the full trading session (9:30–16:00 ET) for the named symbols.
        columns:
          - name: COMPOSITE_FIGI
          - name: SYMBOL
          - name: PRICE_DATE
          - name: OPEN_PRICE
          - name: HIGH_PRICE
          - name: LOW_PRICE
          - name: CLOSE_PRICE
          - name: VOLUME
          - name: VWAP
          - name: SOURCE
            description: Always 'batch_bigquery'.
          - name: LOADED_AT

      - name: COMPANY_OVERVIEW
        description: >
          Reference data for each security — sector (SIC), market cap, shares
          outstanding, listing date. Snapshot per composite_figi; bridged from
          BigQuery via scripts/bq_to_snowflake_fundamentals.py.
        columns:
          - name: COMPOSITE_FIGI
          - name: TICKER
          - name: COMPANY_NAME
          - name: SIC_CODE
          - name: SIC_DESCRIPTION
          - name: MARKET_CAP
          - name: SHARES_OUTSTANDING
          - name: TOTAL_EMPLOYEES
          - name: LIST_DATE

      - name: FUNDAMENTALS_VALUATION
        description: >
          Trailing-twelve-month fundamentals + valuation ratios per security,
          priced as of the last batch daily close. Snapshot — one row per
          composite_figi. Source: BigQuery mart_fundamentals_valuation
          (4-quarter TTM with current quarter's balance sheet).
        columns:
          - name: COMPOSITE_FIGI
          - name: TICKER
          - name: CLOSE_PRICE
            description: Batch close price used to compute the snapshot ratios.
          - name: PRICE_AS_OF
            description: Date of the batch close used in the ratio numerators.
          - name: FINANCIALS_AS_OF
            description: Period-end date of the most recent reported quarter.
          - name: FILING_DATE
          - name: QUARTERS_INCLUDED
            description: Should be 4 (the mart filters to full TTM coverage).
          - name: MARKET_CAP
          - name: SHARES_OUTSTANDING
          - name: PE_RATIO
            description: close / ttm_diluted_eps.
          - name: PB_RATIO
            description: market_cap / book_value.
          - name: PS_RATIO
            description: market_cap / ttm_revenue.
          - name: EV_EBIT
          - name: PRICE_TO_FCF
          - name: GROSS_MARGIN
          - name: OPERATING_MARGIN
          - name: NET_MARGIN
          - name: ROE
          - name: ROA
          - name: CURRENT_RATIO
          - name: DEBT_TO_EQUITY
          - name: TTM_REVENUE
          - name: TTM_NET_INCOME
          - name: TTM_OPERATING_INCOME
          - name: TTM_FREE_CASH_FLOW
          - name: BOOK_VALUE
          - name: TOTAL_ASSETS
          - name: TOTAL_LIABILITIES

      - name: FUNDAMENTALS_FACTOR_SCORES
        description: >
          Cross-sectional value / growth / quality factor scores (percentile
          ranks across the tracked universe) with a coarse classification.
          Snapshot — one row per composite_figi.
        columns:
          - name: COMPOSITE_FIGI
          - name: TICKER
          - name: VALUE_SCORE
            description: Mean percentile across (P/E, P/B, P/S) — low is value.
          - name: GROWTH_SCORE
            description: Mean percentile across (operating_margin, ROE).
          - name: QUALITY_SCORE
            description: Mean percentile across (ROE, leverage, FCF conversion).
          - name: FACTOR_CLASSIFICATION
            description: VALUE / GROWTH / QUALITY / BLEND based on dominant factor.
          - name: PE_RATIO
          - name: PB_RATIO
          - name: OPERATING_MARGIN
          - name: ROE
          - name: DEBT_TO_EQUITY
          - name: FCF_CONVERSION

      - name: DIVIDEND_YIELD
        description: >
          Trailing-twelve-month dividend yield per (composite_figi, ex_dividend_date).
          Time series of every ex-div event with TTM cash per share, batch close
          on the ex-div date, and computed yield.
        columns:
          - name: COMPOSITE_FIGI
          - name: TICKER
          - name: EX_DIVIDEND_DATE
          - name: CASH_AMOUNT
            description: Dividend paid on this event (per share).
          - name: TTM_DIVIDENDS_PER_SHARE
            description: Sum of cash dividends in the trailing 365 days.
          - name: CLOSE_PRICE
            description: Batch close on the ex-dividend date.
          - name: TTM_DIVIDEND_YIELD
            description: ttm_dividends_per_share / close_price (decimal, e.g. 0.025 = 2.5%).

      - name: BATCH_DAILY_RETURNS
        description: >
          Daily close-to-close returns computed on split-adjusted batch prices.
          One row per (composite_figi, price_date). Includes rolling 20-day and
          60-day standard deviation of returns. First row per security has a
          null daily_return by design; volatility_60d is null until 60 sessions
          of history exist for the security.
        columns:
          - name: COMPOSITE_FIGI
          - name: TICKER
          - name: PRICE_DATE
          - name: CLOSE_PRICE
            description: Split-adjusted close from batch fact_daily_prices.
          - name: DAILY_RETURN
            description: close_t / close_{t-1} − 1.
          - name: VOLATILITY_20D
            description: stddev(daily_return) over trailing 20 sessions.
          - name: VOLATILITY_60D
            description: stddev(daily_return) over trailing 60 sessions.
