version: 2

models:
  - name: mart_ops__pipeline_health
    description: >
      Daily pipeline health metrics derived from Gold data. Tracks processing
      latency (p50/p95/p99), throughput, session coverage, and data freshness.
      No additional instrumentation needed — computed from existing timestamps.
    columns:
      - name: event_date
        tests: [not_null]
      - name: symbols_active
        description: Distinct symbols with at least one bar on this date.
      - name: total_bars
        description: Total minute bars ingested across all symbols.
      - name: coverage_pct
        description: >
          Bars received / (symbols_active × 390 expected minutes) × 100.
          100% = full session for every active symbol.
      - name: p50_latency_s
        description: Median processing latency in seconds (market event → Silver write).
      - name: p95_latency_s
        description: 95th percentile processing latency in seconds.
      - name: p99_latency_s
        description: 99th percentile processing latency in seconds.
      - name: bars_per_minute
        description: Average throughput — bars processed per minute of active session.
      - name: total_dollar_volume
        description: Total dollar volume processed (sum of close × volume across all bars).

  - name: mart_ops__data_quality
    description: >
      Per (symbol, date) data quality scorecard. Checks completeness (bar count
      vs 390 expected), validity (prices > 0, high >= low, close within OHLC),
      and freshness (processing latency). Overall quality_score is 0-100 weighted
      composite.
    columns:
      - name: symbol
        tests: [not_null]
      - name: event_date
        tests: [not_null]
      - name: quality_score
        description: >
          Weighted quality score 0-100. Weights: completeness 40%,
          validity 40%, freshness 20%.
      - name: completeness_pct
        description: bar_count / 390 × 100. Full session = ~100%.
      - name: validity_pct
        description: Percentage of bars passing all validity checks.
