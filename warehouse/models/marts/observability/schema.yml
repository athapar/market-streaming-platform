version: 2

models:
  - name: mart_ops__pipeline_health
    description: >
      Daily pipeline health metrics derived from Gold data. Tracks batch ingest
      lag (p50/p95/p99), throughput, regular-session coverage, and data freshness.
      No additional instrumentation needed — computed from existing timestamps.
      Limited to regular-session bars (09:30–16:00 ET) so coverage is measured
      against a regular-hours baseline.
    columns:
      - name: event_date
        tests: [not_null]
      - name: symbols_active
        description: Distinct symbols with at least one regular-session bar on this date.
      - name: total_bars
        description: Total regular-session minute bars ingested across all symbols.
      - name: coverage_pct
        description: >
          Regular-session bars received / (symbols_active × 391 expected minutes)
          × 100, capped at 100. 391 = one bar per minute 09:30–16:00 ET inclusive.
      - name: pipeline_mode
        description: >
          'batch' when p50 batch lag > 120s (bars swept by an availableNow batch),
          else 'streaming'. Flags which ingest tier the day ran in.
      - name: p50_batch_lag_s
        description: >
          Median batch ingest lag in seconds (market minute → Silver write). NOT
          producer→Kafka latency — see kafka_produce_latency_seconds in Grafana.
      - name: p95_batch_lag_s
        description: 95th percentile batch ingest lag in seconds.
      - name: p99_batch_lag_s
        description: 99th percentile batch ingest lag in seconds.
      - name: bars_per_minute
        description: Average throughput — bars processed per minute of active session.
      - name: total_dollar_volume
        description: Total dollar volume processed (sum of close × volume across all bars).

  - name: mart_ops__data_quality
    description: >
      Per (symbol, date) data quality scorecard. quality_score is a 0-100
      composite of in-window completeness (50%) and validity (50%). Completeness
      is measured against the *captured window* (first→last bar), not the full
      session, so it scores data integrity (dropped minutes) rather than how long
      the producer ran. session_coverage_pct reports the partial-vs-full session
      fraction separately and is NOT scored. Batch ingest lag is reported
      (avg/max_batch_lag_s) but excluded — it reflects the availableNow batch
      cadence, not a data defect.
    columns:
      - name: symbol
        tests: [not_null]
      - name: event_date
        tests: [not_null]
      - name: quality_score
        description: >
          Weighted quality score 0-100. Weights: in-window completeness 50%,
          validity 50%. Session coverage and batch lag are excluded.
      - name: completeness_pct
        description: >
          In-window completeness: bars present / bars expected within the
          captured window (first→last bar). Measures dropped/missing minutes,
          not session length. ~100% when no bars were lost during capture.
      - name: session_coverage_pct
        description: >
          bar_count / 391 full-session minutes × 100, capped at 100. How much of
          the 09:30–16:00 ET session was captured. Low on partial-session days by
          design (producer is run for a window) — reported, not scored.
      - name: expected_bars_in_window
        description: Minutes spanned by the captured window (first→last bar, inclusive).
      - name: validity_pct
        description: Percentage of bars passing all validity checks.
