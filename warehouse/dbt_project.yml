name: 'warehouse'
version: '1.0.0'

# Profile name is intentionally distinct from the batch repo's `warehouse`
# profile (which targets BigQuery). Same project layout on disk, different
# warehouse — they must not collide in ~/.dbt/profiles.yml.
profile: 'streaming_warehouse'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  warehouse:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
      analytics:
        +schema: analytics
      observability:
        +schema: observability
      fundamentals:
        +schema: fundamentals
