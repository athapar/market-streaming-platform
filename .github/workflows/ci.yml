name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[producer,dev]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v

  dbt-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-snowflake

      - name: Verify dbt project compiles
        working-directory: warehouse
        run: |
          cp profiles.example.yml profiles.yml
          dbt parse --profiles-dir . --profile streaming_warehouse --target ci

  dag-validation:
    # Validates the Airflow DAGs against the *real* runtime the project ships
    # (Astro Runtime 3.2-4 / Airflow 3.2.1, per the root Dockerfile) without a
    # paid Astro Cloud deployment. `astro dev *` commands run entirely locally:
    # no Astro account, API token, or secrets required.
    name: Validate DAGs (Astro runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install the Astro CLI
        run: curl -sSL https://install.astronomer.io | sudo bash -s

      # Builds the project image from the Dockerfile, then runs the DAG
      # integrity test in .astro/ (DagBag import check — no cycles, no broken
      # imports, all task dependencies resolve). Connections/Variables/env vars
      # are monkeypatched to mocks, so it passes with zero configured secrets.
      - name: Parse DAGs in the Astro runtime
        run: astro dev parse
