name: Deploy to Astro

# Manual-only. The Astro deploy requires an ACTIVE Astronomer organization;
# while billing is inactive an auto-deploy on every push just fails and litters
# the Actions tab with red X's. Trigger from the GitHub Actions UI ("Run
# workflow") when needed. To restore auto-deploy once the Astro org is active,
# re-add the push trigger below:
#
#   push:
#     branches: [main]
#     paths: ['dags/**', 'src/**', 'scripts/**', 'warehouse/**', 'Dockerfile',
#             'requirements.txt', 'pyproject.toml',
#             '.github/workflows/astro-deploy.yml']
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Astro
        uses: astronomer/deploy-action@v0.13.0
        with:
          deployment-id: cmpq1zu151sxl01oz223vplxb
        env:
          ASTRO_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}
